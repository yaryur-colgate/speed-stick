<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colgate</title>
    <!-- Importamos Tailwind CSS para darle estilo rápidamente -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importamos una fuente de Google Fonts parecida a la de la marca -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            /* Aplicamos la fuente importada */
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<body class="bg-[#E3000F] h-screen w-full flex flex-col items-center justify-center relative m-0 overflow-hidden text-center px-6">
    
    <!-- Logo de Colgate en la parte superior -->
    <h1 class="absolute top-8 md:top-12 text-white text-5xl md:text-7xl font-extrabold tracking-tighter select-none">
        Colgate
    </h1>

    <!-- Contenedor del mensaje central -->
    <div class="flex flex-col items-center mt-12 md:mt-16">
        <h2 class="text-white text-4xl md:text-6xl font-bold mb-6 drop-shadow-md">
            página web en construcción...
        </h2>
        <p class="text-white text-xl md:text-3xl font-medium opacity-90 max-w-4xl leading-relaxed">
            Este enlace redirigirá a la experiencia de realidad aumentada de SPEED STICK
        </p>
    </div>

</body>
</html>
